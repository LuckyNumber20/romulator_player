
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Web Emulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="arcade-container">
        
        <div class="loader-section">
            <label for="rom-upload" class="custom-file-upload">
                Choose ROM File (.nes, .gb, .sfc)
            </label>
            <input type="file" id="rom-upload" accept=".nes,.gb,.gbc,.sfc,.md" />
            <p id="rom-name">No game loaded</p>
        </div>

        <div class="screen-wrapper">
            <canvas id="emulator-screen" width="256" height="240"></canvas>
        </div>

        <div class="controls">
            <button id="btn-play" disabled>Play</button>
            <button id="btn-pause" disabled>Pause</button>
            <button id="btn-reset" disabled>Reset</button>
            <button id="btn-save" disabled>Save State</button> <button id="btn-load" disabled>Load State</button> <input type="file" id="state-upload" accept=".sav" style="display:none;" /> <button id="btn-map">Map Controls</button>
        </div>
    </div> <div id="mapping-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Configure Controls</h2>
            <p>Click a button below, then press the keyboard key you want to assign to it.</p>
            <div id="mapping-list">
                </div>
            <button id="btn-close-modal">Save & Close</button>
        </div>
    </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
